<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="100" fill="#0a2218"/>
  <g transform="translate(100,100)">
    <!-- 24 fan blades rotating around center, green gradient -->
    <defs>
      <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#a8f0d0"/>
        <stop offset="100%" style="stop-color:#34d186"/>
      </linearGradient>
    </defs>
    <!-- Generate blades at 15° intervals -->
    <rect x="-5" y="-78" width="8" height="30" rx="2" fill="url(#mg)" transform="rotate(0)"/>
    <rect x="-5" y="-78" width="8" height="26" rx="2" fill="url(#mg)" transform="rotate(15)" opacity="0.9"/>
    <rect x="-5" y="-78" width="8" height="22" rx="2" fill="url(#mg)" transform="rotate(30)" opacity="0.85"/>
    <rect x="-5" y="-78" width="8" height="18" rx="2" fill="url(#mg)" transform="rotate(45)" opacity="0.8"/>
    <rect x="-5" y="-78" width="8" height="14" rx="2" fill="url(#mg)" transform="rotate(60)" opacity="0.75"/>
    <rect x="-5" y="-78" width="8" height="12" rx="2" fill="url(#mg)" transform="rotate(75)" opacity="0.7"/>
    <rect x="-5" y="-78" width="8" height="14" rx="2" fill="url(#mg)" transform="rotate(90)" opacity="0.75"/>
    <rect x="-5" y="-78" width="8" height="18" rx="2" fill="url(#mg)" transform="rotate(105)" opacity="0.8"/>
    <rect x="-5" y="-78" width="8" height="22" rx="2" fill="url(#mg)" transform="rotate(120)" opacity="0.85"/>
    <rect x="-5" y="-78" width="8" height="26" rx="2" fill="url(#mg)" transform="rotate(135)" opacity="0.9"/>
    <rect x="-5" y="-78" width="8" height="30" rx="2" fill="url(#mg)" transform="rotate(150)"/>
    <rect x="-5" y="-78" width="8" height="26" rx="2" fill="url(#mg)" transform="rotate(165)" opacity="0.9"/>
    <rect x="-5" y="-78" width="8" height="22" rx="2" fill="url(#mg)" transform="rotate(180)" opacity="0.85"/>
    <rect x="-5" y="-78" width="8" height="18" rx="2" fill="url(#mg)" transform="rotate(195)" opacity="0.8"/>
    <rect x="-5" y="-78" width="8" height="14" rx="2" fill="url(#mg)" transform="rotate(210)" opacity="0.75"/>
    <rect x="-5" y="-78" width="8" height="12" rx="2" fill="url(#mg)" transform="rotate(225)" opacity="0.7"/>
    <rect x="-5" y="-78" width="8" height="14" rx="2" fill="url(#mg)" transform="rotate(240)" opacity="0.75"/>
    <rect x="-5" y="-78" width="8" height="18" rx="2" fill="url(#mg)" transform="rotate(255)" opacity="0.8"/>
    <rect x="-5" y="-78" width="8" height="22" rx="2" fill="url(#mg)" transform="rotate(270)" opacity="0.85"/>
    <rect x="-5" y="-78" width="8" height="26" rx="2" fill="url(#mg)" transform="rotate(285)" opacity="0.9"/>
    <rect x="-5" y="-78" width="8" height="30" rx="2" fill="url(#mg)" transform="rotate(300)"/>
    <rect x="-5" y="-78" width="8" height="26" rx="2" fill="url(#mg)" transform="rotate(315)" opacity="0.9"/>
    <rect x="-5" y="-78" width="8" height="22" rx="2" fill="url(#mg)" transform="rotate(330)" opacity="0.85"/>
    <rect x="-5" y="-78" width="8" height="18" rx="2" fill="url(#mg)" transform="rotate(345)" opacity="0.8"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="26" fill="#0a2218"/>
  </g>
</svg>
